project:
  name: CPose
  dashboard_url: http://localhost:5000

phase1:
  model: yolov8n.pt
  conf_threshold: 0.35
  pre_buffer_sec: 3
  post_buffer_sec: 3
  inference_every: 5
  min_clip_duration: 2.0
  storage_limit_gb: 10

phase2:
  model: yolo11n.pt
  conf_threshold: 0.50
  progress_every: 10

phase3:
  model: yolo11n-pose.pt
  conf_threshold: 0.45
  keypoint_conf_min: 0.30
  window_size: 30
  progress_every: 10

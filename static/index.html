<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPose Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="app">
    <!-- LEFT COLUMN: Brand + Register + Lamps + Logs (YELLOW) -->
    <aside class="left-col">
      <section class="brand card">
        <div class="brand-head">
          <div>
            <h1>CPose</h1>
          </div>
        </div>

        <div class="brand-actions">
          <label class="btn" for="multicamInput">Multicam</label>
          <label class="btn" for="rawInput">Raw Video</label>
          <button class="btn primary" id="startBtn">Start</button>
          <button class="btn" id="clearBtn">Clear Logs</button>
          <button class="btn" id="refreshBtn">Refresh</button>
          <button class="btn danger" id="stopBtn">Stop</button>
        </div>

        <input id="multicamInput" class="hidden" type="file" webkitdirectory directory multiple />
        <input id="rawInput" class="hidden" type="file" webkitdirectory directory multiple />
      </section>



      <section class="logs card">
        <div class="logs-toolbar">
          <input id="searchInput" type="text" placeholder="Search logs..." />
          <button class="btn export" id="exportBtn">Export</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:40%">TIME</th>
                <th style="width:40%">EVENT</th>
                <th style="width:20%">CAM</th>
              </tr>
            </thead>
            <tbody id="logTable">
              <tr>
                <td colspan="3" style="text-align:center;padding:12px;color:#999">No logs yet</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </aside>

    <!-- CENTER COLUMN: Live Webcam + Video Viewers + Summary -->
    <main class="center-col">
      <section class="live-webcam-section">
        <div class="webcam-and-register-row">
          <section class="register-panel">
            <div class="register-head" style="display:flex; justify-content:space-between; align-items:center;">
              <h3 style="margin:0;">Register person</h3>
              <span id="registerStatus" class="hidden"
                style="color:#ef4444; font-size:10px; font-weight:700; padding:2px 6px; background:rgba(239,68,68,0.1); border-radius:4px;">Yêu
                cầu ĐK</span>
            </div>
            <div class="register-form-stacked">
              <input type="text" id="personName" placeholder="Tên" class="form-input" />
              <input type="number" id="personAge" placeholder="Tuổi" class="form-input" />
              <input type="text" id="personId" placeholder="ID" class="form-input" />

              <div class="register-buttons-row" style="grid-template-columns: 1fr;">
                <button class="btn btn-action-green" id="registerBtn" style="width: 100%;">Đăng ký person</button>
              </div>
              <div id="pipelineProgressContainer" class="hidden" style="margin-top: 12px;">
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px; color:#555; font-weight:600;">
                  <span>Tiến độ xử lý</span>
                  <span id="pipelineProgressText">0%</span>
                </div>
                <div style="width:100%; height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden;">
                  <div id="pipelineProgressBar" style="height:100%; width:0%; background:#10b981; transition:width 0.3s ease;"></div>
                </div>
              </div>
            </div>
          </section>
          <article class="viewer-card card webcam-card">
            <div class="viewer-head">
              <div>
                <h2>Live Webcam</h2>
                <span class="viewer-sub" id="webcamMeta"></span>
              </div>
              <div class="viewer-actions">
                <button id="openWebcamBtn" class="btn btn-action-green" style="padding:4px 8px; font-size:10px;">Open
                  cam</button>
                <button id="closeWebcamBtn" class="btn btn-action-red" style="padding:4px 8px; font-size:10px;">Close
                  cam</button>
              </div>
            </div>
            <div class="webcam-shell hidden" id="webcamShell">
              <video id="liveWebcam" muted playsinline preload="metadata"></video>
            </div>
            <div class="viewer-empty" id="webcamEmpty"></div>
          </article>
        </div>
      </section>

      <section class="viewers-container">
        <div class="viewers-row">
          <article class="viewer-card card">
            <div class="viewer-head">
              <div>
                <h2>Original</h2>
              </div>
              <div class="viewer-btn-group">
                <button id="openOriginal" class="view-btn view-btn-green">Open</button>
                <button id="closeOriginal" class="view-btn view-btn-red-sm">Close</button>
              </div>
            </div>
            <div class="viewer-shell hidden" id="originalShell">
              <img id="originalVideo" style="width:100%;height:100%;object-fit:contain;background:#000;" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" />
            </div>
            <div class="viewer-empty" id="originalEmpty"></div>
          </article>

          <article class="viewer-card card">
            <div class="viewer-head">
              <div>
                <h2>Processed</h2>
              </div>
              <div class="viewer-btn-group">
                <button id="openProcessed" class="view-btn view-btn-green">Open</button>
                <button id="closeProcessed" class="view-btn view-btn-red-sm">Close</button>
              </div>
            </div>
            <div class="viewer-shell hidden" id="processedShell">
              <img id="processedVideo" style="width:100%;height:100%;object-fit:contain;background:#000;" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" />
            </div>
            <div class="viewer-empty" id="processedEmpty"></div>
          </article>
        </div>
      </section>


      <section class="summary card" style="padding: 12px; overflow-x: auto;">
        <div style="flex: 1;">
          <table class="summary-table" style="margin: 0; min-width: 100%;">
            <thead>
              <tr>
                <th style="width:8%">ON</th>
                <th style="width:12%">Camera</th>
                <th style="width:10%">ID</th>
                <th style="width:10%">Conf</th>
                <th style="width:10%">FPS</th>
                <th style="width:10%">Frame</th>
                <th style="width:20%">Action</th>
              </tr>
            </thead>
            <tbody id="summaryTableBody">
              <!-- Dynamically populated by JS based on loaded cameras -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- RIGHT COLUMN: Queue + Pending Results (PINK) -->
    <aside class="right-col">
      <section class="queue-section">
        <div class="section-title">Video</div>
        <div id="clipQueue" class="queue-list"></div>
      </section>
      <section class="pending-section" id="pendingSection">
        <div id="pendingList" class="result-list" style="flex: 1; min-height: 0; overflow-y: auto;"></div>

        <!-- Local Preview Player for selected clips -->
        <div class="preview-local-container"
          style="margin-top: 8px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px;">
          <div
            style="background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid rgba(255,255,255,0.1);">
            <video id="previewVideoLocal" muted playsinline controls
              style="width: 100%; height: 100%; object-fit: contain;"></video>
            <div id="previewVideoEmpty"
              style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #64748b;">
              Chưa chọn video</div>
          </div>
        </div>
      </section>
    </aside>
  </div>

  <!-- Preview Modal -->
  <div class="preview-modal hidden" id="previewModal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <div class="modal-head">
        <span id="modalTitle">Preview</span>
        <button class="close-btn" id="closePreviewBtn">&times;</button>
      </div>
      <div class="modal-body">
        <video id="previewVideo" muted controls preload="metadata"></video>
      </div>
    </div>
  </div>

  <!-- Registration Modal -->
  <div class="register-modal hidden" id="registerModal">
    <div class="modal-overlay" id="registerOverlay"></div>
    <div class="modal-content">
      <div class="modal-head">
        <span id="registerTitle">Đăng ký khuôn mặt</span>
        <button class="close-btn" id="closeRegisterBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row"><label>Tên</label><input id="reg_name" type="text" /></div>
        <div class="form-row"><label>Tuổi</label><input id="reg_age" type="number" /></div>
        <div class="form-row"><label>ID</label><input id="reg_id" type="text" /></div>
        <div style="margin-top:10px;text-align:right;"><button class="btn primary" id="registerSubmitBtn">Gửi</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

  <!-- socket.io v4.x: tương thích với python-socketio 5.x (EIO protocol v4) -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"
    integrity="sha384-mkQ3/7FUtcGyoppY6bz/PORUfTfs4FWIQ6DuhFoiYT/dV4oS4NbvGzYI7mkl3Hm" crossorigin="anonymous"></script>
  <script src="/static/app.js"></script>
</body>

</html>

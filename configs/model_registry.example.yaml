detector:
  name: yolo11n
  path: models/yolo11n.pt
  fallback: [yolo11n.pt, yolov8n.pt]
  conf: 0.50
  imgsz: 640
  class_id: 0

pose:
  name: yolo11n-pose
  path: models/yolo11n-pose.pt
  fallback: [models/yolov8n-pose.pt, yolov8n-pose.pt]
  conf: 0.45
  keypoint_conf: 0.30
  imgsz: 640

tracker:
  name: bytetrack
  config: configs/bytetrack.yaml
  max_age: 30
  min_hits: 3

adl:
  method: rule_based
  window_size: 30
  min_visible_keypoints: 8
  temporal_smoothing_frames: 5

reid:
  strong_threshold: 0.65
  weak_threshold: 0.45
  confirm_frames: 3
  top_k_candidates: 20

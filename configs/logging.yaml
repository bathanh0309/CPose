version: 1

formatters:
  standard:
    format: "[%(levelname)s] %(asctime)s %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  summary:
    format: "[%(levelname)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: WARNING
    formatter: summary
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: standard
    filename: dataset/runs/cpose.log
    encoding: utf-8

root:
  level: WARNING
  handlers: [console]

loggers:
  cpose:
    level: INFO
    handlers: [console]
    propagate: false

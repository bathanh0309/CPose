system:
  device: "cpu"
  event_log: "data/output/events/pipeline.jsonl"
  vis_dir: "data/output/vis"
  default_source: ""
  save_video: false

sources:
  pose: "data/test/cam2_2026-01-29_16-26-40.mp4"
  track: "data/test/cam2_2026-01-29_16-26-40.mp4"
  #reid: "data/test/cam2_2026-01-29_16-26-40.mp4"
  reid: "data/test/thanh-huy-2.mp4"
  adl: "data/test/cam2_2026-01-29_16-26-40.mp4"
  object: "data/test/cam2_2026-01-29_16-26-40.mp4"
  #pipeline: "data/test/cam2_2026-01-29_16-26-40.mp4" # APhu
  #pipeline: "data/body/Thanh/7799042247298.mp4" #(Thành)
  #pipeline: "data/body/Huy/cam2_Huy.mp4" #(huy)
  pipeline: "data/test/thanh-huy-2.mp4"
logging:
  enabled: false
  level: "INFO"
  save_events: false

output:
  short_names: true
  save_json: false
  save_video: false
  auto_save_video: false
  auto_save_excel: false
  save_on_demand: true

pose:
  enabled: true
  weights: "models/yolo11n-pose.pt"
  fallback_weights: "models/yolo11n-pose.pt"
  conf: 0.55
  iou: 0.5
  imgsz: 416
  min_keypoints: 5
  min_keypoint_score: 0.35
  infer_every_n_frames: 4

tracking:
  enabled: true
  model_type: "pedestrian"
  weights: "models/tracking.pt"
  fallback_weights: "models/yolo11n.pt"
  conf: 0.40
  iou: 0.5
  imgsz: 416
  min_box_area: 600
  min_keypoints: 5
  min_keypoint_score: 0.35
  track_thresh: 0.45
  low_thresh: 0.10
  match_thresh: 0.30
  track_buffer: 30
  track_ttl_frames: 6
  min_conf_for_cache: 0.55
  max_cached_tracks: 2
  max_iou_duplicate: 0.60
  tracker_yaml: "bytetrack.yaml"
  classes:
    - 0

object:
  enabled: false
  weights: "models/yolo11n.pt"
  conf: 0.7
  iou: 0.7
  classes: [pickleball]

person_gate:
  enabled: true
  weights: "models/yolo11n.pt"
  fallback_weights: "models/yolo11n.pt"
  conf: 0.25
  iou: 0.5
  imgsz: 640
  classes: [0]
  min_box_area: 600
  interval_frames: 5
  lost_grace_frames: 15
  log_interval_frames: 15
  draw_gate_box: true

ui:
  enabled: true
  log_metrics: true
  max_log_lines: 300
  metrics_interval_frames: 10

web:
  threaded_camera: true
  stream_width: 960
  target_fps: 15
  jpeg_quality: 55
  jpeg_quality_min: 45
  metrics_interval_frames: 15
  loop_local_video: true
  local_file_sequential: true
  rtsp_latest_frame: true
  frame_skip_lag_multiplier: 2.0
  recording_buffer_max: 500
  start_ai_on_person_only: false
  person_gate_interval_frames: 3
  no_person_log_interval_frames: 30
  lost_person_grace_frames: 30
  draw_waiting_panel: true
  gallery_enabled: true
  gallery_interval_frames: 30
  max_gallery_items: 20
  ai_workers: 2
  encode_workers: 1

reid:
  mode: "body_only"
  model_name: "osnet_x0_25"
  weights: "models/osnet_x0_25_msmt17.pth"
  fallback_weights: "models/osnet_x0_25_msmt17.pth"
  body_embedding_pkls:
    - "data/embeddings"
  body_embedding_dirs: []
  face_embedding_dirs: []
  legacy_embedding_dirs: []
 
  threshold: 0.5
  # Modality-specific base thresholds (set higher for body to avoid false positives)
  threshold_body: 0.65
  threshold_face: 0.75

  # Threshold required when changing from one known gallery ID to another
  threshold_known_to_known: 0.85
  # When switching away from a recently-held ID (below min_hold_frames),
  # require an even higher threshold to protect against flapping.
  threshold_known_to_known_protect: 0.95
  threshold_unknown_to_known: 0.45
  threshold_known_to_unknown: 0.45
  # If true, use per-transition thresholds (known->known, unknown->known, ...)
  use_transition_thresholds: true
  # Minimum consecutive frames to hold an assigned ID before allowing a switch
  min_hold_frames: 10
  min_gallery_size: 1
  reid_interval: 45
  reid_log_interval: 45
  min_track_age: 15
  min_track_conf: 0.60
  min_crop_area: 3500
  max_gallery: 10

adl:
  enabled: true
  # backend: "efficientgcn" | "disabled"
  model_type: "efficientgcn"
  device: "cpu"
  precision_hint: "f16"
  conf_threshold: 0.3
  min_frames: 30
  infer_every_n_frames: 15
  lost_track_threshold: 30
  weights: "models/2015_EfficientGCN-B0_ntu-xsub120.pth.tar"
  fallback_weights: "models/2015_EfficientGCN-B0_ntu-xsub120.pth.tar"
  export_pkl: false
  fallback: "rules"
  disable_if_load_failed: true
  num_classes: 60
  seq_len: 48
  stride: 12
  max_idle_frames: 150
  default_label: 0
  label_map_path: "configs/adl/nturgbd_120.txt"
  auto_infer: false

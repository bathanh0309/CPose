detector:
  name: yolo11n
  path: models/weights/yolo11n.pt
  fallback:
    - models/weights/yolov8n.pt
    - yolov8n.pt
  conf: 0.5
  imgsz: 640
  class_id: 0

tracker:
  name: bytetrack
  min_hits: 3
  max_age: 30

pose:
  name: yolo11n-pose
  path: models/weights/yolo11n-pose.pt
  fallback:
    - models/weights/yolov8n-pose.pt
    - yolov8n-pose.pt
  conf: 0.45
  keypoint_conf: 0.30
  imgsz: 640

adl:
  method: rule_based
  window_size: 30
  min_visible_keypoints: 8
  smoothing_frames: 5

reid:
  method: tfcs_par
  strong_threshold: 0.65
  weak_threshold: 0.45
  top_k_candidates: 20

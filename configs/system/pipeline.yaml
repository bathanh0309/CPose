system:
  device: "cpu"
  event_log: "data/output/events/pipeline.jsonl"
  vis_dir: "data/output/vis"
  default_source: "data/input/cam2_2026-01-29_16-26-40.mp4"
  save_video: false

logging:
  enabled: false
  level: "INFO"
  save_events: false

output:
  short_names: true
  save_json: false
  save_video: false
  auto_save_video: false
  auto_save_excel: false
  save_on_demand: true

pose:
  enabled: true
  weights: "models/yolo11n-pose.pt"
  conf: 0.55
  iou: 0.5
  imgsz: 416
  min_keypoints: 5
  min_keypoint_score: 0.35
  infer_every_n_frames: 3

tracking:
  enabled: true
  model_type: "pedestrian"
  weights: "models/tracking.pt"
  fallback_weights: "models/yolo11n.pt"
  conf: 0.35
  iou: 0.5
  imgsz: 416
  min_box_area: 600
  min_keypoints: 5
  min_keypoint_score: 0.35
  infer_every_n_frames: 2
  # TrackCache tuning (fixes ghost tracks)
  track_ttl_frames: 12
  min_conf_for_cache: 0.45
  max_cached_tracks: 5
  tracker_yaml: "bytetrack.yaml"
  classes:
    - 0

object:
  enabled: false
  weights: "models/yolo11n.pt"
  conf: 0.7
  iou: 0.7
  classes: [pickleball]

person_gate:
  enabled: true
  weights: "models/yolo11n.pt"
  fallback_weights: "models/yolo11n.pt"
  conf: 0.25
  iou: 0.5
  imgsz: 416
  classes: [0]
  min_box_area: 600
  interval_frames: 5
  lost_grace_frames: 15
  log_interval_frames: 15
  draw_gate_box: true

ui:
  enabled: true
  log_metrics: true
  max_log_lines: 300
  metrics_interval_frames: 10

web:
  threaded_camera: true
  stream_width: 960
  infer_every_n_frames: 2
  target_fps: 15
  jpeg_quality: 55
  jpeg_quality_min: 45
  metrics_interval_frames: 10
  loop_local_video: true
  frame_skip_lag_multiplier: 2.0
  recording_buffer_max: 300
  start_ai_on_person_only: false
  person_gate_interval_frames: 3
  no_person_log_interval_frames: 30
  lost_person_grace_frames: 30
  draw_waiting_panel: true
  gallery_enabled: true
  gallery_interval_frames: 30
  max_gallery_items: 20

reid:
  weights: "models/fastreid_market_R50.pth"
  fastreid_root: ".github/fast-reid"
  gallery_dir: "data/gallery"
  embedding_dirs:
    - "data/face"
    - "data/body"
  id_aliases:
    person01: APhu
  threshold: 0.55
  reid_interval: 30
  min_track_age: 10
  min_crop_area: 2500
  fastreid_config:
    MODEL:
      META_ARCHITECTURE: "Baseline"
      BACKBONE:
        NAME: "build_resnet_backbone"
        NORM: "BN"
        DEPTH: "50x"
        LAST_STRIDE: 1
        FEAT_DIM: 2048
        WITH_IBN: false
        PRETRAIN: true
      HEADS:
        NAME: "EmbeddingHead"
        NORM: "BN"
        WITH_BNNECK: true
        POOL_LAYER: "GlobalAvgPool"
        NECK_FEAT: "before"
        CLS_LAYER: "Linear"
      LOSSES:
        NAME:
          - "CrossEntropyLoss"
          - "TripletLoss"
        CE:
          EPSILON: 0.1
          SCALE: 1.0
        TRI:
          MARGIN: 0.3
          HARD_MINING: true
          NORM_FEAT: false
          SCALE: 1.0
    INPUT:
      SIZE_TRAIN: [256, 128]
      SIZE_TEST: [256, 128]
      REA:
        ENABLED: true
        PROB: 0.5
      FLIP:
        ENABLED: true
      PADDING:
        ENABLED: true
    DATASETS:
      NAMES:
        - "Market1501"
      TESTS:
        - "Market1501"
    DATALOADER:
      SAMPLER_TRAIN: "NaiveIdentitySampler"
      NUM_INSTANCE: 4
      NUM_WORKERS: 8
    SOLVER:
      AMP:
        ENABLED: true
      OPT: "Adam"
      MAX_EPOCH: 120
      BASE_LR: 0.00035
      WEIGHT_DECAY: 0.0005
      WEIGHT_DECAY_NORM: 0.0005
      IMS_PER_BATCH: 64
      SCHED: "MultiStepLR"
      STEPS: [40, 90]
      GAMMA: 0.1
      WARMUP_FACTOR: 0.1
      WARMUP_ITERS: 2000
      CHECKPOINT_PERIOD: 30
    TEST:
      EVAL_PERIOD: 30
      IMS_PER_BATCH: 128
    CUDNN_BENCHMARK: true

adl:
  enabled: true
  # backend: "rules" | "efficientgcn" | "disabled"
  # posec3d is OFFLINE only -- never used in web realtime
  model_type: "rules"
  device: "CPU"
  precision_hint: "f16"
  conf_threshold: 0.3
  min_frames: 30
  infer_every_n_frames: 15
  lost_track_threshold: 30
  weights: "models/posec3d_r50_ntu60.pth"
  export_dir: "data/output/clips_pkl"
  work_dir: "data/output/clips_pkl"
  # export_pkl: false means no pkl spam during web realtime
  export_pkl: false
  num_classes: 60
  seq_len: 48
  stride: 12
  max_idle_frames: 150
  default_label: 0
  # label_map_path must be at same indent level as other adl keys (was wrongly indented before)
  label_map_path: ".github/pose-c3d/tools/data/label_map/nturgbd_120.txt"
  auto_infer: false
  mmaction_root: ".github/pose-c3d"
  posec3d_config:
    model:
      type: "Recognizer3D"
      backbone:
        type: "ResNet3dSlowOnly"
        in_channels: 17
        base_channels: 32
        num_stages: 3
        out_indices: [2]
        stage_blocks: [4, 6, 3]
        conv1_stride: [1, 1]
        pool1_stride: [1, 1]
        inflate: [0, 1, 1]
        spatial_strides: [2, 2, 2]
        temporal_strides: [1, 1, 2]
      cls_head:
        type: "I3DHead"
        in_channels: 512
        num_classes: 60
        dropout: 0.5
      test_cfg:
        average_clips: "prob"
    dataset_type: "PoseDataset"
    left_kp: [1, 3, 5, 7, 9, 11, 13, 15]
    right_kp: [2, 4, 6, 8, 10, 12, 14, 16]
    test_pipeline:
      - type: "UniformSampleFrames"
        clip_len: 48
        num_clips: 10
      - type: "PoseDecode"
      - type: "PoseCompact"
        hw_ratio: 1.0
        allow_imgpad: true
      - type: "Resize"
        scale: [64, 64]
        keep_ratio: false
      - type: "GeneratePoseTarget"
        with_kp: true
        with_limb: false
        double: true
        left_kp: [1, 3, 5, 7, 9, 11, 13, 15]
        right_kp: [2, 4, 6, 8, 10, 12, 14, 16]
      - type: "FormatShape"
        input_format: "NCTHW_Heatmap"
      - type: "Collect"
        keys: ["imgs"]
        meta_keys: []
      - type: "ToTensor"
        keys: ["imgs"]

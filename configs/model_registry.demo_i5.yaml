runtime:
  device: cpu
  demo_mode: true
  target_resolution: 640
  process_every_n_frames: 2
  max_people_per_frame: 3

human_detection:
  backend: ultralytics
  model: models/yolo/yolov8n.pt
  fallback:
    - yolov8n.pt
  imgsz: 640
  conf: 0.50
  iou: 0.50
  class_id: 0

human_tracking:
  backend: ultralytics_bytetrack
  model: models/yolo/yolov8n.pt
  fallback:
    - yolov8n.pt
  tracker_config: bytetrack.yaml
  conf: 0.50
  min_hits: 3
  max_age: 30
  min_track_quality: 0.45

pose_estimation:
  backend: ultralytics
  model: models/yolo/yolov8n-pose.pt
  fallback:
    - yolov8n-pose.pt
  imgsz: 640
  conf: 0.45
  keypoint_conf: 0.30
  track_iou_threshold: 0.30
  run_on_confirmed_tracks_only: true

adl_recognition:
  method: rule_based
  window_size: 30
  min_visible_keypoints: 8
  min_visible_ratio: 0.50
  smoothing_frames: 7
  knee_sitting_angle: 125
  walking_velocity: 0.05
  falling_velocity: 0.08
  lying_aspect_ratio: 1.15

face:
  enabled: false
  run_every_n_frames: 10
  min_face_size: 40
  detector: scrfd_500m
  recognizer: arcface_r100
  anti_spoofing_enabled: false
  anti_spoofing_model: models/face/minifasnet.onnx
  spoof_threshold: 0.50

global_reid:
  method: tfcs_par
  strong_threshold: 0.65
  weak_threshold: 0.45
  ambiguous_margin: 0.05
  confirm_frames: 3
  max_candidate_age_sec: 300
  weights:
    normal:
      face: 0.30
      body: 0.20
      pose: 0.15
      height: 0.10
      time: 0.15
      topology: 0.10
    no_face:
      body: 0.30
      pose: 0.20
      height: 0.15
      time: 0.20
      topology: 0.15
    clothing_change_suspected:
      face: 0.35
      body: 0.05
      pose: 0.20
      height: 0.15
      time: 0.15
      topology: 0.10

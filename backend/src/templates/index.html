<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVEN — Multi-Camera Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --bg-input: #0d1520;
            --accent-cyan: #06d6a0;
            --accent-blue: #118ab2;
            --accent-yellow: #ffd166;
            --accent-red: #ef476f;
            --text-primary: #f0f4f8;
            --text-secondary: #8899aa;
            --border: #1e2d3d;
            --glass: rgba(17, 25, 40, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.08), rgba(17, 138, 178, 0.08));
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-brand .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.idle {
            background: rgba(136, 153, 170, 0.15);
            color: var(--text-secondary);
            border: 1px solid rgba(136, 153, 170, 0.2);
        }

        .status-badge.running {
            background: rgba(6, 214, 160, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 214, 160, 0.3);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(6, 214, 160, 0);
            }

            50% {
                box-shadow: 0 0 12px 2px rgba(6, 214, 160, 0.2);
            }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .running .status-dot {
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ===== MAIN LAYOUT ===== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 0;
            height: calc(100vh - 65px);
        }

        /* ===== VIDEO PANEL ===== */
        .video-panel {
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
        }

        .overlay-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .overlay-tag.camera {
            background: rgba(6, 214, 160, 0.2);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 214, 160, 0.3);
        }

        .overlay-tag.live {
            background: rgba(239, 71, 111, 0.3);
            color: #ff6b8a;
            border: 1px solid rgba(239, 71, 111, 0.4);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        /* ===== REGISTRATION CARD ===== */
        .card {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--accent-cyan);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(6, 214, 160, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-start {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .btn-start.start {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #fff;
        }

        .btn-start.start:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(6, 214, 160, 0.3);
        }

        .btn-start.stop {
            background: linear-gradient(135deg, var(--accent-red), #d63384);
            color: #fff;
        }

        .btn-start.stop:hover {
            box-shadow: 0 4px 20px rgba(239, 71, 111, 0.3);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ===== PROFILE CARD ===== */
        .profile-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(6, 214, 160, 0.06);
            border: 1px solid rgba(6, 214, 160, 0.15);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: #fff;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .profile-meta {
            font-size: 0.72rem;
            color: var(--text-secondary);
        }

        /* ===== LOG CARD ===== */
        .log-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.72rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .log-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .log-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .log-line {
            padding: 1px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-line.highlight {
            color: var(--accent-cyan);
        }

        .log-line.error {
            color: var(--accent-red);
        }

        .log-line.registered {
            color: var(--accent-yellow);
            font-weight: 600;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-bar-container {
            padding: 0 20px 12px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-input);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 50vh 1fr;
            }

            .sidebar {
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">
            <div>
                <h1>HAVEN</h1>
                <div class="subtitle">Multi-Camera Monitoring · Pose · ADL · ReID</div>
            </div>
        </div>
        <div id="statusBadge" class="status-badge idle">
            <span class="status-dot"></span>
            <span id="statusText">IDLE</span>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-content">
        <!-- VIDEO -->
        <div class="video-panel">
            <div class="video-container">
                <img id="videoStream" src="/video_feed" alt="HAVEN Stream">
                <div class="video-overlay">
                    <span id="cameraTag" class="overlay-tag camera" style="display:none;">CAM1</span>
                    <span id="liveTag" class="overlay-tag live" style="display:none;">● LIVE</span>
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- Registration -->
            <div class="card">
                <div class="card-title">Registration</div>
                <form id="regForm" onsubmit="startSystem(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" value="Anh Phu" required placeholder="Enter name...">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="regAge" value="25" min="1" max="120" required>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="regGender">
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="btnStart" class="btn-start start">▶ Start System</button>
                </form>
                <button id="btnStop" class="btn-start stop" style="display:none;" onclick="stopSystem()">■ Stop</button>
            </div>

            <!-- Detected Profiles -->
            <div class="card" id="profilesCard" style="display:none;">
                <div class="card-title">Detected Profiles</div>
                <div id="profilesList"></div>
            </div>

            <!-- Progress -->
            <div class="card" id="progressCard" style="display:none;">
                <div class="card-title">Progress</div>
                <div class="progress-bar-container">
                    <div class="progress-info">
                        <span id="progressCamera">-</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Logs -->
            <div class="card log-container">
                <div class="card-title">System Logs</div>
                <div class="log-scroll" id="logScroll">
                    <div class="log-line" style="color: var(--text-secondary);">Waiting to start...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let polling = null;

        async function startSystem(e) {
            e.preventDefault();

            const name = document.getElementById('regName').value.trim();
            const age = parseInt(document.getElementById('regAge').value);
            const gender = document.getElementById('regGender').value;

            if (!name) return alert('Please enter a name');

            const btn = document.getElementById('btnStart');
            btn.disabled = true;
            btn.textContent = '⏳ Starting...';

            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, age, gender })
                });

                if (res.ok) {
                    // Switch to running state
                    document.getElementById('regForm').style.display = 'none';
                    document.getElementById('btnStop').style.display = 'block';
                    document.getElementById('progressCard').style.display = 'block';

                    setStatus('running');

                    // Refresh video stream
                    document.getElementById('videoStream').src = '/video_feed?' + Date.now();

                    // Start polling
                    startPolling();
                }
            } catch (err) {
                alert('Error starting system: ' + err);
                btn.disabled = false;
                btn.textContent = '▶ Start System';
            }
        }

        async function stopSystem() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                resetUI();
            } catch (err) {
                console.error(err);
            }
        }

        function resetUI() {
            document.getElementById('regForm').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
            const btn = document.getElementById('btnStart');
            btn.disabled = false;
            btn.textContent = '▶ Start System';
            setStatus('idle');

            if (polling) {
                clearInterval(polling);
                polling = null;
            }
        }

        function setStatus(state) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            const cameraTag = document.getElementById('cameraTag');
            const liveTag = document.getElementById('liveTag');

            badge.className = 'status-badge ' + state;
            text.textContent = state.toUpperCase();

            if (state === 'running') {
                liveTag.style.display = 'inline';
            } else {
                cameraTag.style.display = 'none';
                liveTag.style.display = 'none';
            }
        }

        function startPolling() {
            polling = setInterval(async () => {
                try {
                    const res = await fetch('/api/status');
                    const data = await res.json();

                    // Update camera tag
                    if (data.camera) {
                        const tag = document.getElementById('cameraTag');
                        tag.textContent = data.camera.toUpperCase();
                        tag.style.display = 'inline';
                    }

                    // Update progress
                    if (data.progress && data.progress.total > 0) {
                        const pct = Math.round((data.progress.current / data.progress.total) * 100);
                        document.getElementById('progressFill').style.width = pct + '%';
                        document.getElementById('progressPercent').textContent = pct + '%';
                        document.getElementById('progressCamera').textContent =
                            `Camera ${data.progress.current}/${data.progress.total}`;
                    }

                    // Update profiles
                    const profiles = data.profiles || {};
                    const keys = Object.keys(profiles);
                    if (keys.length > 0) {
                        document.getElementById('profilesCard').style.display = 'block';
                        let html = '';
                        keys.forEach(gid => {
                            const p = profiles[gid];
                            const g = p.gender === 'male' ? 'M' : 'F';
                            html += `
                                <div class="profile-item">
                                    <div class="profile-avatar">G${gid}</div>
                                    <div class="profile-info">
                                        <div class="profile-name">${p.name}</div>
                                        <div class="profile-meta">${p.age} years · ${g}</div>
                                    </div>
                                </div>
                            `;
                        });
                        document.getElementById('profilesList').innerHTML = html;
                    }

                    // Update logs
                    if (data.logs && data.logs.length > 0) {
                        const logDiv = document.getElementById('logScroll');
                        let html = '';
                        data.logs.forEach(line => {
                            let cls = 'log-line';
                            if (line.includes('REGISTERED')) cls += ' registered';
                            else if (line.includes('confirmed')) cls += ' highlight';
                            else if (line.includes('Error') || line.includes('error')) cls += ' error';
                            html += `<div class="${cls}">${escapeHtml(line)}</div>`;
                        });
                        logDiv.innerHTML = html;
                        logDiv.scrollTop = logDiv.scrollHeight;
                    }

                    // Check if done
                    if (!data.running && data.logs && data.logs.length > 0) {
                        setStatus('idle');
                        document.getElementById('statusText').textContent = 'COMPLETE';
                        if (polling) {
                            clearInterval(polling);
                            polling = null;
                        }
                        document.getElementById('regForm').style.display = 'block';
                        document.getElementById('btnStop').style.display = 'none';
                        document.getElementById('btnStart').disabled = false;
                        document.getElementById('btnStart').textContent = '▶ Start System';
                    }
                } catch (err) {
                    console.error('Poll error:', err);
                }
            }, 500);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>

</html>

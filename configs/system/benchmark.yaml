benchmark:
  enabled: false
  report_formats:
    - "json"
    - "csv"
  warmup_frames: 30
  max_frames: 0
  sample_interval: 1
  device: "cpu"

runtime_metrics:
  fps:
    enabled: true
    description: "Frames processed per second."
    unit: "frames/second"
    aggregate:
      - "mean"
      - "median"
      - "min"
      - "max"
      - "p95"
  latency:
    enabled: true
    description: "Per-frame processing time."
    unit: "ms/frame"
    aggregate:
      - "mean"
      - "median"
      - "p90"
      - "p95"
      - "p99"
  memory:
    enabled: true
    description: "Peak CPU/GPU memory during evaluation."
    unit: "MB"
    aggregate:
      - "peak"

modules:
  pose:
    name: "YOLO11-Pose"
    enabled: true
    predictions_path: "data/output/pose_results.json"
    ground_truth_path: ""
    metrics:
      - "fps"
      - "latency"
      - "precision"
      - "recall"
      - "map50"
      - "map50_95"
      - "oks_ap"
      - "oks_ar"

  pedestrian_tracking:
    name: "Custom YOLO Pedestrian + ByteTrack"
    enabled: true
    ground_truth_path: ""
    metrics:
      - "fps"
      - "latency"
      - "mota"
      - "motp"
      - "idf1"
      - "id_precision"
      - "id_recall"
      - "id_switches"
      - "mostly_tracked"
      - "mostly_lost"
      - "false_positives"
      - "false_negatives"

  reid:
    name: "FastReID"
    enabled: true
    embeddings_dir: "data/face"
    gallery_dir: "data/gallery"
    query_dir: ""
    metrics:
      - "latency"
      - "top1_accuracy"
      - "top5_accuracy"
      - "map"
      - "cmc_rank1"
      - "cmc_rank5"
      - "cmc_rank10"
      - "cosine_threshold_accuracy"
    threshold_sweep:
      enabled: true
      min: 0.30
      max: 0.90
      step: 0.05

  adl:
    name: "EfficientGCN ADL"
    enabled: true
    ground_truth_path: ""
    label_map_path: ""
    metrics:
      - "latency"
      - "top1_accuracy"
      - "top5_accuracy"
      - "precision_macro"
      - "recall_macro"
      - "f1_macro"
      - "confusion_matrix"
      - "per_class_accuracy"
    confusion_matrix:
      normalize: true

  full_pipeline:
    name: "Full CPose Pipeline"
    enabled: true
    metrics:
      - "fps"
      - "latency"
      - "end_to_end_latency"
      - "tracks_per_frame"
      - "persons_per_frame"
      - "reid_match_rate"
      - "adl_clip_export_rate"

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CPose Control Panel - Pro Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">CPose</span>
      <span class="subtitle">Realtime AI Analytics Panel</span>
    </div>
  </header>

  <main class="layout">
    <section class="cameras-container">
      
      <div class="cam-card">
        <div class="cam-header">
          <span class="cam-label">CAMERA 1</span>
          <span class="cam-status status-offline" id="status-1">Chờ kết nối</span>
        </div>
        
        <div class="cam-source">
          <select id="cam1-source" class="select-input">
            <option value="">-- Chọn nguồn RTSP / File (resources.txt) --</option>
          </select>
          <label class="btn btn-outline" title="Tải video lên">
            📁 Upload
            <input type="file" id="file-upload-1" accept="video/*" hidden onchange="handleCamUpload(event, 1)"/>
          </label>
        </div>

        <div class="cam-controls">
          <div class="control-row modules-row">
            <span class="row-title">Modules:</span>
            <button id="btn-track-1" class="btn-module active" onclick="toggleModule(1, 'track')">Tracking</button>
            <button id="btn-pose-1" class="btn-module active" onclick="toggleModule(1, 'pose')">Pose</button>
            <button id="btn-reid-1" class="btn-module" onclick="toggleModule(1, 'reid')">ReID</button>
            <button id="btn-adl-1" class="btn-module" onclick="toggleModule(1, 'adl')">ADL</button>
          </div>

          <div class="control-row actions-row">
            <button class="btn btn-on" onclick="startStream(1)">▶ ON</button>
            <button class="btn btn-off" onclick="stopStream(1)">⏹ OFF</button>
            <button id="save-btn-1" class="btn btn-action" onclick="saveVideo(1)" disabled>💾 Lưu Video</button>
            <button id="save-excel-btn-1" class="btn btn-action" onclick="saveExcel(1)" disabled>📊 Lưu Excel</button>
          </div>
        </div>

        <div class="cam-view">
          <img id="frame-1" class="cam-frame" alt="Camera 1 stream"/>
          <div class="cam-placeholder" id="placeholder-1">
            <span>Nhấn ON để bắt đầu luồng Cam 1</span>
          </div>
        </div>

        <div class="cam-log">
          <div class="log-header">
            <span>Log Camera 1</span>
            <button class="btn-clear" onclick="clearLog(1)">Xóa</button>
          </div>
          <div class="log-box" id="log-box-1"></div>
        </div>
      </div>

      <div class="cam-card">
        <div class="cam-header">
          <span class="cam-label">CAMERA 2</span>
          <span class="cam-status status-offline" id="status-2">Chờ kết nối</span>
        </div>
        
        <div class="cam-source">
          <select id="cam2-source" class="select-input">
            <option value="">-- Chọn nguồn RTSP / File (resources.txt) --</option>
          </select>
          <label class="btn btn-outline" title="Tải video lên">
            📁 Upload
            <input type="file" id="file-upload-2" accept="video/*" hidden onchange="handleCamUpload(event, 2)"/>
          </label>
        </div>

        <div class="cam-controls">
          <div class="control-row modules-row">
            <span class="row-title">Modules:</span>
            <button id="btn-track-2" class="btn-module active" onclick="toggleModule(2, 'track')">Tracking</button>
            <button id="btn-pose-2" class="btn-module active" onclick="toggleModule(2, 'pose')">Pose</button>
            <button id="btn-reid-2" class="btn-module" onclick="toggleModule(2, 'reid')">ReID</button>
            <button id="btn-adl-2" class="btn-module" onclick="toggleModule(2, 'adl')">ADL</button>
          </div>

          <div class="control-row actions-row">
            <button class="btn btn-on" onclick="startStream(2)">▶ ON</button>
            <button class="btn btn-off" onclick="stopStream(2)">⏹ OFF</button>
            <button id="save-btn-2" class="btn btn-action" onclick="saveVideo(2)" disabled>💾 Lưu Video</button>
            <button id="save-excel-btn-2" class="btn btn-action" onclick="saveExcel(2)" disabled>📊 Lưu Excel</button>
          </div>
        </div>

        <div class="cam-view">
          <img id="frame-2" class="cam-frame" alt="Camera 2 stream"/>
          <div class="cam-placeholder" id="placeholder-2">
            <span>Nhấn ON để bắt đầu luồng Cam 2</span>
          </div>
        </div>

        <div class="cam-log">
          <div class="log-header">
            <span>Log Camera 2</span>
            <button class="btn-clear" onclick="clearLog(2)">Xóa</button>
          </div>
          <div class="log-box" id="log-box-2"></div>
        </div>
      </div>

    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
